services:
  postgres:
    image: postgres:16-alpine
    container_name: cacic-voto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cacic_voto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - cacic-voto-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cacic_voto']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cacic-voto-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - cacic-voto-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cacic-voto-postgres:
  cacic-voto-redis:
