name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || github.token }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected projects
        run: bunx nx affected -t lint --parallel=3

      - name: Run unit tests with coverage
        run: bunx nx run-many --target=test --all --parallel=3 --coverage

      - name: Build deployable apps
        run: bunx nx run-many -t build -p frontend,backend --configuration=production --parallel=2

      - name: Collect coverage reports
        id: coverage
        shell: bash
        run: |
          if [ ! -d coverage ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t reports < <(find coverage -type f \( -name 'lcov.info' -o -name 'coverage-final.json' -o -name 'coverage.xml' -o -name 'clover.xml' \) | sort)

          if [ "${#reports[@]}" -eq 0 ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reports_csv="$(IFS=,; echo "${reports[*]}")"
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
          echo "files=$reports_csv" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        if: steps.coverage.outputs.has_reports == 'true'
        uses: codecov/codecov-action@v6
        with:
          flags: unit
          files: ${{ steps.coverage.outputs.files }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cacic_voto_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cacic_voto_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cacic_voto_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || github.token }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Apply database migrations
        run: bunx prisma migrate deploy --config apps/backend/prisma.config.ts

      - name: Run backend auth e2e tests with fresh Keycloak
        run: bun run e2e:backend:keycloak -- --coverage

      - name: Collect backend e2e coverage reports
        id: coverage
        shell: bash
        run: |
          if [ ! -d coverage/backend-e2e ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t reports < <(find coverage/backend-e2e -type f \( -name 'lcov.info' -o -name 'coverage-final.json' -o -name 'coverage.xml' -o -name 'clover.xml' \) | sort)

          if [ "${#reports[@]}" -eq 0 ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reports_csv="$(IFS=,; echo "${reports[*]}")"
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
          echo "files=$reports_csv" >> "$GITHUB_OUTPUT"

      - name: Upload backend e2e coverage to Codecov
        if: steps.coverage.outputs.has_reports == 'true'
        uses: codecov/codecov-action@v6
        with:
          flags: e2e-backend
          files: ${{ steps.coverage.outputs.files }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || github.token }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run mocked browser e2e tests
        run: bunx nx e2e frontend-e2e -- --project=chromium
        env:
          E2E_START_SERVERS: 'true'
          E2E_WEB_SERVER_COMMAND: bunx nx run frontend:serve-static

  prepare-untrusted-pr:
    name: Prepare untrusted PR dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect sensitive file changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"

          echo "$changed_files"

          if echo "$changed_files" | grep -E '(^\.github/workflows/.*\.ya?ml$|(^|/)(package\.json|bun\.lock|bun\.lockb|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|\.npmrc|bunfig\.toml)$|^apps/backend/prisma/|^apps/backend/prisma\.config\.ts$|^apps/[^/]+/Dockerfile(\.dockerignore)?$)'; then
            echo "::error::Fork PR changed CI/CD, dependency, lockfile, package-auth, Docker, or Prisma files."
            echo "::error::A maintainer must review this and run full CI from a trusted branch."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies without lifecycle scripts
        run: bun install --frozen-lockfile --ignore-scripts
        env:
          NPM_CONFIG_TOKEN: ${{ github.token }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Remove package registry auth material
        if: always()
        run: |
          rm -f ~/.npmrc
          rm -f ~/.bunfig.toml
          rm -f bunfig.toml
          rm -f .npmrc
          unset NPM_CONFIG_TOKEN

      - name: Upload prepared dependencies
        uses: actions/upload-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: |
            node_modules
            apps/**/node_modules
            libs/**/node_modules
          retention-days: 1
          include-hidden-files: false

  untrusted-pr-checks:
    name: Untrusted PR checks
    runs-on: ubuntu-latest

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected projects
        run: bunx nx affected -t lint --parallel=3

      - name: Run unit tests with coverage
        run: bunx nx affected -t test --parallel=3 --coverage

      - name: Build deployable apps
        run: bunx nx run-many -t build -p frontend,backend --configuration=production --parallel=2

  untrusted-pr-backend-e2e:
    name: Untrusted PR backend E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cacic_voto_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cacic_voto_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cacic_voto_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Generate Prisma client
        run: bunx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Apply database migrations
        run: bunx prisma migrate deploy --config apps/backend/prisma.config.ts

      - name: Run backend auth e2e tests with fresh Keycloak
        run: bun run e2e:backend:keycloak

  untrusted-pr-frontend-e2e:
    name: Untrusted PR frontend E2E
    runs-on: ubuntu-latest

    needs:
      - prepare-untrusted-pr

    permissions:
      contents: read

    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Download prepared dependencies
        uses: actions/download-artifact@v6
        with:
          name: untrusted-pr-node-modules
          path: .

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run mocked browser e2e tests
        run: bunx nx e2e frontend-e2e -- --project=chromium
        env:
          E2E_START_SERVERS: 'true'
          E2E_WEB_SERVER_COMMAND: bunx nx run frontend:serve-static
