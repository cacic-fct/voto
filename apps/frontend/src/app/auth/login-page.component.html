<main class="login-page">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-icon mat-card-avatar>how_to_vote</mat-icon>
      <mat-card-title>CACiC Voto</mat-card-title>
      <mat-card-subtitle>Plataforma de votações</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <h1>Entre para continuar</h1>
      <p>Use sua conta CACiC para acessar votações disponíveis e, quando autorizado, a área restrita.</p>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-flat-button type="button" (click)="login()">
        <mat-icon>login</mat-icon>
        Entrar
      </button>
    </mat-card-actions>
  </mat-card>
</main>
